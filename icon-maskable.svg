<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable (safe zone is center 80%) -->
  <rect width="512" height="512" fill="#0d0d0d"/>
  <!-- Top-left QR corner -->
  <rect x="92" y="92" width="130" height="130" rx="14" fill="#c8f53a"/>
  <rect x="112" y="112" width="90" height="90" rx="10" fill="#0d0d0d"/>
  <rect x="128" y="128" width="58" height="58" rx="7" fill="#c8f53a"/>
  <!-- Top-right QR corner -->
  <rect x="290" y="92" width="130" height="130" rx="14" fill="#c8f53a"/>
  <rect x="310" y="112" width="90" height="90" rx="10" fill="#0d0d0d"/>
  <rect x="326" y="128" width="58" height="58" rx="7" fill="#c8f53a"/>
  <!-- Bottom-left QR corner -->
  <rect x="92" y="290" width="130" height="130" rx="14" fill="#c8f53a"/>
  <rect x="112" y="310" width="90" height="90" rx="10" fill="#0d0d0d"/>
  <rect x="128" y="326" width="58" height="58" rx="7" fill="#c8f53a"/>
  <!-- Bottom-right data dots -->
  <rect x="290" y="290" width="36" height="36" rx="7" fill="#c8f53a"/>
  <rect x="340" y="290" width="36" height="36" rx="7" fill="#c8f53a"/>
  <rect x="390" y="290" width="36" height="36" rx="7" fill="#c8f53a"/>
  <rect x="290" y="340" width="36" height="36" rx="7" fill="#c8f53a"/>
  <rect x="390" y="340" width="36" height="36" rx="7" fill="#c8f53a"/>
  <rect x="290" y="390" width="36" height="36" rx="7" fill="#c8f53a"/>
  <rect x="340" y="390" width="36" height="36" rx="7" fill="#c8f53a"/>
</svg>
